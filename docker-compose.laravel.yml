services:
  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - paytrack

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./laravel:/var/www
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=paytrack
      - DB_USERNAME=paytrack
      - DB_PASSWORD=paytrack_dev_password
    networks:
      - paytrack

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: paytrack
      MYSQL_USER: paytrack
      MYSQL_PASSWORD: paytrack_dev_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - paytrack

volumes:
  mysql_data:

networks:
  paytrack:
    driver: bridge
